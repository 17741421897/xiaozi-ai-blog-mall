<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block pageTitle %}个人博客{% endblock %}</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- 头部导航 -->
    <header class="siteHeader">
        <div class="container">
            <div class="headerContent">
                <h1 class="siteTitle">
                    <a href="{{ url_for('indexPage') }}">我的技术博客</a>
                </h1>
                <nav class="mainNav">
                    <ul class="navList">
                        <li class="navItem">
                            <a href="{{ url_for('indexPage') }}" class="navLink">首页</a>
                        </li>
                        <li class="navItem">
                            <a href="{{ url_for('aboutPage') }}" class="navLink">关于</a>
                        </li>
                        <li class="navItem">
                            <a href="{{ url_for('videoPage') }}" class="navLink">播客视频</a>
                        </li>
                        <li class="navItem">
                            <a href="{{ url_for('shopPage') }}" class="navLink">店铺</a>
                        </li>
                        <li class="navItem">
                            <a href="{{ url_for('view_cart') }}" class="navLink flex items-center">
                                <i class="bi bi-cart3 mr-1"></i>
                                购物车
                                <span id="cart-badge" class="ml-1 px-1.5 py-0.5 text-xs bg-red-500 text-white rounded-full">
                                    {{ session.get('cart', {}) | length }}
                                </span>
                            </a>
                        </li>
                        {% if session.get('logged_in') %}
                        <li class="navItem">
                            <a href="{{ url_for('create_post') }}" class="navLink">写文章</a>
                        </li>
                        <li class="navItem">
                            <a href="{{ url_for('profile') }}" class="navLink">个人中心</a>
                        </li>
                        <li class="navItem">
                            <a href="{{ url_for('logout') }}" class="navLink">退出</a>
                        </li>
                        {% else %}
                        <li class="navItem">
                            <a href="{{ url_for('login') }}" class="navLink">登录</a>
                        </li>
                        <li class="navItem">
                            <a href="{{ url_for('register') }}" class="navLink">注册</a>
                        </li>
                        {% endif %}
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main class="mainContent">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="siteFooter">
        <div class="container">
            <div class="footerContent">
                <p class="copyright">&copy; 2026 我的技术博客. 保留所有权利.</p>
                <div class="socialLinks">
                    <a href="#" class="socialLink">GitHub</a>
                    <a href="#" class="socialLink">Twitter</a>
                    <a href="#" class="socialLink">Email</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Flash Message Modal -->
    <div id="flash-modal" class="fixed inset-0 z-[9999] hidden items-center justify-center bg-black/50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-sm w-full mx-4 transform transition-all scale-95 opacity-0" id="modal-card">
            <div class="text-center">
                <div id="modal-icon" class="mx-auto mb-4 w-16 h-16 rounded-full flex items-center justify-center text-3xl">
                    <!-- Icon injected by JS -->
                </div>
                <h3 id="modal-title" class="text-xl font-bold text-gray-800 mb-2">提示</h3>
                <p id="modal-message" class="text-gray-600 mb-6">这里是消息内容</p>
                <button id="close-modal" class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition-colors duration-200">
                    确定
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const messages = [];
            {% for category, message in get_flashed_messages(with_categories=true) %}
                messages.push({ category: '{{ category }}', message: '{{ message }}' });
            {% endfor %}

            if (messages.length > 0) {
                const msg = messages[0];
                const modal = document.getElementById('flash-modal');
                const card = document.getElementById('modal-card');
                const icon = document.getElementById('modal-icon');
                const title = document.getElementById('modal-title');
                const text = document.getElementById('modal-message');
                const btn = document.getElementById('close-modal');

                if (msg.category === 'success') {
                    icon.innerHTML = '✅';
                    icon.className = 'mx-auto mb-4 w-16 h-16 rounded-full flex items-center justify-center text-3xl bg-green-100 text-green-600';
                    title.innerText = '操作成功';
                    btn.className = 'w-full py-3 px-4 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-xl transition-colors duration-200';
                } else {
                    icon.innerHTML = '❌';
                    icon.className = 'mx-auto mb-4 w-16 h-16 rounded-full flex items-center justify-center text-3xl bg-red-100 text-red-600';
                    title.innerText = '操作失败';
                    btn.className = 'w-full py-3 px-4 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-xl transition-colors duration-200';
                }
                text.innerText = msg.message;

                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    card.classList.remove('scale-95', 'opacity-0');
                    card.classList.add('scale-100', 'opacity-100');
                }, 10);

                btn.onclick = function() {
                    card.classList.remove('scale-100', 'opacity-100');
                    card.classList.add('scale-95', 'opacity-0');
                    setTimeout(() => {
                        modal.classList.add('hidden');
                        modal.classList.remove('flex');
                    }, 200);
                };
            }
        });
    </script>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
