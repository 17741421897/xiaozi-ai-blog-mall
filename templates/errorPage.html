{% extends "baseLayout.html" %}

{% block pageTitle %}错误 - 我的技术博客{% endblock %}

{% block content %}
<div class="errorPage">
    <div class="errorContainer">
        <div class="errorIcon">⚠️</div>
        <h1 class="errorTitle">出错了</h1>
        <p class="errorMessage">{{ message }}</p>
        <div class="errorActions">
            <a href="{{ url_for('indexPage') }}" class="backHomeBtn">
                返回首页
            </a>
        </div>
    </div>
</div>
{% endblock %}
