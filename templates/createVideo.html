{% extends "baseLayout.html" %}

{% block content %}
<div class="upload-container">
    <h1 class="page-title">发布播客视频</h1>
    <div class="upload-card">
        <form action="{{ url_for('upload_video') }}" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">视频标题</label>
                <input type="text" id="title" name="title" placeholder="请输入吸引人的标题" required>
            </div>
            
            <div class="form-group">
                <label for="description">视频描述</label>
                <textarea id="description" name="description" rows="4" placeholder="分享这个视频的核心内容..."></textarea>
            </div>
            
            <div class="form-group">
                <label for="duration">视频时长 (例如: 12:30)</label>
                <input type="text" id="duration" name="duration" placeholder="mm:ss">
            </div>
            
            <div class="form-group">
                <label for="video_file">选择视频文件 (MP4)</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="video_file" name="video_file" accept="video/mp4" required>
                </div>
            </div>
            
            <div class="form-actions">
                <a href="{{ url_for('videoPage') }}" class="btn-cancel">取消</a>
                <button type="submit" class="btn-submit">立即发布</button>
            </div>
        </form>
    </div>
</div>

<style>
    .upload-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 40px 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .page-title {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
        font-size: 2rem;
    }
    .upload-card {
        background: #fff;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #555;
    }
    .form-group input, .form-group textarea {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        box-sizing: border-box;
        transition: border-color 0.3s;
    }
    .form-group input:focus, .form-group textarea:focus {
        outline: none;
        border-color: #4a90e2;
        box-shadow: 0 0 0 3px rgba(74,144,226,0.1);
    }
    .file-upload-wrapper {
        border: 2px dashed #ddd;
        padding: 20px;
        text-align: center;
        border-radius: 8px;
        background: #fafafa;
    }
    .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        margin-top: 30px;
    }
    .btn-cancel {
        text-decoration: none;
        padding: 12px 24px;
        color: #666;
        border: 1px solid #ddd;
        border-radius: 8px;
        transition: all 0.3s;
    }
    .btn-cancel:hover {
        background: #f5f5f5;
    }
    .btn-submit {
        padding: 12px 30px;
        background: #4a90e2;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.3s;
    }
    .btn-submit:hover {
        background: #357abd;
    }
</style>
{% endblock %}
