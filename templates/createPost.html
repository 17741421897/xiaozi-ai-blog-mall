{% extends "baseLayout.html" %}
{% block pageTitle %}写文章 - 个人博客{% endblock %}

{% block content %}
<!-- 引入 Quill 样式 -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<div class="max-w-4xl mx-auto my-10">
    <div class="mb-8">
        <h2 class="text-3xl font-bold text-gray-800">发布新文章</h2>
        <p class="text-gray-500">分享你的技术见解与生活思考</p>
    </div>

    <form action="{{ url_for('create_post') }}" method="POST" id="postForm" class="bg-white shadow-xl rounded-2xl p-8 border border-gray-100">
        <div class="grid grid-cols-1 gap-6">
            <!-- 标题 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">文章标题 <span class="text-red-500">*</span></label>
                <input type="text" name="title" required 
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" 
                       placeholder="输入一个吸引人的标题...">
            </div>

            <!-- 摘要 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">文章摘要</label>
                <textarea name="summary" rows="2" 
                          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all" 
                          placeholder="简要描述文章内容..."></textarea>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-4">
                <!-- 分类 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">分类</label>
                    <select name="category" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="技术">技术</option>
                        <option value="生活">生活</option>
                        <option value="思考">思考</option>
                        <option value="教程">教程</option>
                    </select>
                </div>
                <!-- 标签 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">标签 (逗号分隔)</label>
                    <input type="text" name="tags" 
                           class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" 
                           placeholder="Python, Flask, Web开发">
                </div>
            </div>

            <!-- 正文 -->
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">正文内容 <span class="text-red-500">*</span></label>
                <div id="editor-container" class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                    <div id="editor" style="height: 400px;"></div>
                </div>
                <input type="hidden" name="content" id="content-input" required>
            </div>

            <div class="flex items-center justify-end gap-4 mt-4">
                <a href="{{ url_for('indexPage') }}" class="px-6 py-3 text-gray-600 hover:text-gray-800 font-medium transition-colors">取消</a>
                <button type="submit" class="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl shadow-lg shadow-blue-200 transition-all transform hover:-translate-y-1">
                    立即发布
                </button>
            </div>
        </div>
    </form>
</div>

<!-- 引入 Quill JS -->
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    // 初始化编辑器
    var quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: '开始书写你的故事...',
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                ['link', 'image', 'code-block'],
                ['clean']
            ]
        }
    });

    // 表单提交前同步内容
    document.getElementById('postForm').onsubmit = function() {
        var content = quill.root.innerHTML;
        // 检查是否只有空标签 (Quill 默认会有一个 <p><br></p>)
        if (quill.getText().trim().length === 0) {
            alert('正文内容不能为空');
            return false;
        }
        document.getElementById('content-input').value = content;
        return true;
    };
</script>
{% endblock %}
