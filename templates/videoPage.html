{% extends "baseLayout.html" %}

{% block content %}
<div class="video-container">
    <h1 class="page-title">播客视频展示</h1>
    <div style="text-align: center; margin-bottom: 30px;">
        <a href="{{ url_for('upload_video') }}" class="btn-publish">➕ 发布新视频</a>
    </div>
    <div class="video-grid">
        {% for video in videos %}
        <div class="video-card">
            <div class="video-wrapper">
                <video controls preload="metadata">
                    <source src="{{ video.url }}" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
            </div>
            <div class="video-info">
                <h3>{{ video.title }}</h3>
                <p class="description">{{ video.description }}</p>
                <div class="video-meta" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <span class="duration">时长: {{ video.duration }}</span>
                    {% if video.user_id == session['user_id'] %}
                        <a href="{{ url_for('delete_video', videoId=video.id) }}" 
                           class="videoDeleteBtn" 
                           style="padding: 4px 10px; font-size: 0.8rem; width: auto; display: inline-block;"
                           onclick="return confirm('确定要删除这个视频吗？删除后不可恢复！')">🗑️ 删除视频</a>
                    {% endif %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    .video-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 40px 20px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .page-title {
        text-align: center;
        color: #333;
        margin-bottom: 40px;
        font-size: 2.5rem;
    }
    .video-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 30px;
    }
    .video-card {
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        transition: transform 0.3s ease;
    }
    .video-card:hover {
        transform: translateY(-5px);
    }
    .video-wrapper video {
        width: 100%;
        display: block;
        aspect-ratio: 16 / 9;
        background: #000;
    }
    .video-info {
        padding: 20px;
    }
    .video-info h3 {
        margin: 0 0 10px 0;
        color: #2c3e50;
        font-size: 1.25rem;
    }
    .video-info .description {
        color: #666;
        font-size: 0.95rem;
        line-height: 1.5;
        margin-bottom: 15px;
    }
    .video-info .duration {
        display: inline-block;
        background: #eee;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 0.8rem;
        color: #888;
    }
</style>
{% endblock %}
