{% extends 'baseLayout.html' %}
{% block pageTitle %}我的小店铺{% endblock %}

{% block content %}
<div class="py-8">
    <div class="flex flex-col items-center text-center mb-12">        
    <div class="flex items-center justify-center space-x-4 mb-4">            
    <h2 class="text-4xl font-bold text-gray-800">我的小店铺</h2>            
    {% if session.get('logged_in') %}            
    <a href="{{ url_for('create_product') }}" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-all shadow-sm">                + 上传产品            
    </a>            
    {% endif %}        
    </div>        
    <p class="text-gray-600">精选服务与资料，支持购物车下单</p>    
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        {% for product in products %}
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-shadow duration-300">
            <div class="aspect-video bg-gray-50 flex items-center justify-center">
                <img src="{{ product.image }}" alt="{{ product.name }}" class="w-32 h-32 object-contain">
            </div>
            <div class="p-6">
                <h3 class="text-xl font-bold text-gray-800 mb-2">{{ product.name }}</h3>
                <p class="text-gray-600 text-sm mb-4 line-clamp-2">{{ product.description }}</p>
                <div class="flex items-center justify-between mt-6">
                    <span class="text-2xl font-bold text-blue-600">{{ product.price }}</span>
                    <button 
                        onclick="addToCart({{ product.id }})"
                        class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors">
                        加入购物车
                    </button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>


{% endblock %}
