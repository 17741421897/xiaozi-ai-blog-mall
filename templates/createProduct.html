{% extends 'baseLayout.html' %}
{% block pageTitle %}上传新产品{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-12 px-4">
    <div class="text-center mb-10">
        <h2 class="text-3xl font-bold text-gray-800 mb-2">上传新产品</h2>
        <p class="text-gray-600">在你的小店铺中添加新的商品或服务</p>
    </div>

    <form action="{{ url_for('create_product') }}" method="POST" enctype="multipart/form-data" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">产品名称</label>
            <input type="text" name="name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">价格 (￥)</label>
                <input type="number" step="0.01" name="price" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">产品图片</label>
                <input type="file" name="product_image" accept="image/*" required class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">产品描述</label>
            <textarea name="description" rows="4" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"></textarea>
        </div>

        <div class="flex items-center justify-end space-x-4 pt-4">
            <a href="{{ url_for('shopPage') }}" class="text-gray-600 hover:text-gray-800 font-medium transition-colors">取消</a>
            <button type="submit" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold transition-all shadow-md hover:shadow-lg">
                确认发布
            </button>
        </div>
    </form>
</div>
{% endblock %}
