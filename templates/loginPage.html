{% extends "baseLayout.html" %}

{% block title %}登录{% endblock %}

{% block content %}
<!-- 引入 Tailwind CSS CDN 修复样式失效问题 -->
<script src="https://cdn.tailwindcss.com"></script>
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-100 via-slate-200 to-slate-300 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-lg w-full space-y-8 bg-white p-8 sm:p-12 rounded-3xl shadow-xl border border-slate-100 transition-all">
        <div class="text-center">
            <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">欢迎回来</h2>
            <p class="mt-3 text-sm text-slate-500">请登录您的账号以继续</p>
        </div>
        
        {% if error %}
        <div class="bg-red-50 border-l-4 border-red-400 text-red-700 px-4 py-3 rounded-r-lg shadow-sm" role="alert">
            <span class="block sm:inline text-sm font-medium">{{ error }}</span>
        </div>
        {% endif %}

        <form class="mt-8 space-y-6" method="POST" action="{{ url_for('login') }}">
            <div class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-semibold text-slate-700 ml-1">用户名</label>
                    <input type="text" id="username" name="username" 
                        class="mt-1.5 block w-full px-4 py-3 border border-slate-200 rounded-xl shadow-sm placeholder-slate-400 
                        focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all duration-200 sm:text-sm"
                        placeholder="请输入用户名" required>
                </div>
                <div>
                    <label for="password" class="block text-sm font-semibold text-slate-700 ml-1">密码</label>
                    <input type="password" id="password" name="password" 
                        class="mt-1.5 block w-full px-4 py-3 border border-slate-200 rounded-xl shadow-sm placeholder-slate-400 
                        focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all duration-200 sm:text-sm"
                        placeholder="请输入密码" required>
                </div>
            </div>

            <div>
                <button type="submit" 
                    class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-lg text-sm font-bold text-white 
                    bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 
                    transition-all duration-200 active:scale-[0.98] cursor-pointer">
                    登录
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
